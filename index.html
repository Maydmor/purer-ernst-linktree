<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalsdorf Calling</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px 40px;
        }
        .avatar {
            width: 120px;
            height: auto;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .avatar img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
        }
        .name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        .handle {
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .links {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .link {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .link:hover {
            background: #222;
            border-color: #444;
            transform: translateY(-1px);
        }
        .link-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .link-icon.ig {
            background: #d6249f;
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
        }
        .link-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }
        .link-text {
            flex: 1;
        }
        .link-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 2px;
        }
        .link-desc {
            font-size: 13px;
            color: #888;
        }
        .link-arrow {
            color: #666;
            font-size: 18px;
        }
        .ticket-btn {
            display: block;
            width: 100%;
            padding: 20px 24px;
            background: #fff;
            color: #0a0a0a;
            text-decoration: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s ease;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .ticket-btn:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }
        .divider {
            height: 1px;
            background: #222;
            margin: 8px 0;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="avatar"><img src="kalsdorf-calling-logo-transparent.png" alt="Kalsdorf Calling"></div>
    <div class="name">Kalsdorf Calling</div>
    <div class="handle">@seniorenklub · @purer.ernst</div>

    <div class="links">
        <a href="https://buy.stripe.com/28E5kvfXzdIF6b48jI1Jm35" target="_blank" rel="noopener" class="ticket-btn">
            Kalsdorf Calling Tickets →
        </a>

        <div class="divider"></div>

        <a href="https://www.instagram.com/seniorenklub/" target="_blank" rel="noopener" class="link">
            <div class="link-icon"><img src="seniorenklub-logo.jpg" alt="Seniorenklub"></div>
            <div class="link-text">
                <div class="link-title">Seniorenklub</div>
                <div class="link-desc">Instagram</div>
            </div>
            <div class="link-arrow">›</div>
        </a>

        <a href="https://www.instagram.com/purer.ernst/" target="_blank" rel="noopener" class="link">
            <div class="link-icon"><img src="purer-ernst-logo.png" alt="Purer Ernst"></div>
            <div class="link-text">
                <div class="link-title">Purer Ernst</div>
                <div class="link-desc">Instagram</div>
            </div>
            <div class="link-arrow">›</div>
        </a>
    </div>

    <div class="footer">Kalsdorf Calling</div>
</body>
</html>
